name: Refresh WC2026 feed

# Cloud replacement for the local launchd cron: rebuilds public/wc2026-data.json
# from openfootball and commits+pushes ONLY on a meaningful change. Runs 24/7,
# independent of any laptop (so live scores keep updating even while the Mac
# sleeps). The storefront fetches the raw feed — the live THEME is never touched.
#
# Public repo ⇒ Actions minutes are free & unlimited. Zero npm deps. All dates
# are computed in Asia/Jerusalem inside lib/transform.mjs, so UTC runners are
# correct; TZ is set below as belt-and-suspenders.

on:
  # Scheduled auto-refresh DISABLED 2026-07-22: the 2026 World Cup is over and the
  # feed is frozen at its final state (Spain champion, final 1-0). There are no more
  # results to fetch, so the 5-min cron only burned cycles. Re-enable by uncommenting
  # the `schedule:` block below; or run a one-off rebuild from the Actions tab /
  # `gh workflow run refresh-feed.yml` (workflow_dispatch stays on).
  # schedule:
  #   - cron: "*/5 * * * *"   # every 5 minutes (GitHub's finest granularity)
  workflow_dispatch: {}      # manual runs from the Actions tab / gh workflow run

# Only let GITHUB_TOKEN write contents; never let two runs race the same push.
permissions:
  contents: write
concurrency:
  group: refresh-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Jerusalem
    steps:
      - name: Checkout (main, full history so git show/push are clean)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      # No setup-node: the runner ships Node 20+ and the project is zero-dependency,
      # so `node scripts/refresh.mjs` runs on the preinstalled runtime directly.

      - name: Identify the committer
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebuild feed + commit/push if changed
        run: node scripts/refresh.mjs
